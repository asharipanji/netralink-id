name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # Jangan batalkan run yang sedang berjalan: membatalkan deploy produksi
  # di tengah jalan bisa meninggalkan situs dalam keadaan setengah terbit.
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Kumpulkan berkas yang boleh tayang
        # Jangan pakai path '.' — itu ikut menerbitkan README.md dan .gitignore
        # ke situs publik (mis. netralink.id/README.md). Salin hanya yang perlu.
        run: |
          mkdir -p _site
          cp index.html _site/
          if [ -d assets ]; then cp -R assets _site/; fi

      - name: Konfigurasi GitHub Pages
        uses: actions/configure-pages@v6

      - name: Unggah artefak
        uses: actions/upload-pages-artifact@v5
        with:
          path: '_site'

      - name: Deploy ke GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
